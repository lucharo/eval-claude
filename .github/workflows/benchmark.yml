name: Benchmark

on:
  schedule:
    - cron: '0 6,18 * * *' # Twice daily: 6am and 6pm UTC
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

concurrency:
  group: benchmark
  cancel-in-progress: false

jobs:
  matrix:
    runs-on: ubuntu-latest
    outputs:
      models: ${{ steps.read.outputs.models }}
    steps:
      - uses: actions/checkout@v4
      - name: Read models from config
        id: read
        run: echo "models=$(cat models.json)" >> "$GITHUB_OUTPUT"

  eval:
    needs: matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        model: ${{ fromJson(needs.matrix.outputs.models) }}

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Authenticate Claude Code
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          mkdir -p ~/.claude
          echo '{"hasCompletedOnboarding":true}' > ~/.claude.json
          EXPIRES_AT=$(($(date +%s) * 1000 + 31536000000))
          uv run python -c "
          import json, os
          creds = {'claudeAiOauth': {
              'accessToken': os.environ['CLAUDE_CODE_OAUTH_TOKEN'],
              'expiresAt': ${EXPIRES_AT},
              'scopes': ['user:inference']
          }}
          with open(os.path.expanduser('~/.claude/.credentials.json'), 'w') as f:
              json.dump(creds, f)
          "

      - name: Verify Claude Code auth
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          echo "Testing CLI auth..."
          claude -p "Reply with just the word 'hello'" --output-format json --dangerously-skip-permissions 2>&1 || true

      - name: Install dependencies
        run: uv sync

      - name: Run GPQA Diamond eval
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          uv run inspect eval inspect_evals/gpqa_diamond \
            --model claude-code/${{ matrix.model }} \
            --limit 50 \
            -T epochs=1 \
            -M max_connections=10 \
            -M timeout=600

      - name: Parse results
        id: parse
        run: |
          set +e
          uv run python scripts/parse_eval.py > /tmp/result.json
          EXIT_CODE=$?
          set -e
          if [ $EXIT_CODE -eq 0 ]; then
            echo "Parsed result: $(cat /tmp/result.json)"
            echo "valid=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Parse failed (exit $EXIT_CODE) — skipping result upload"
            echo "valid=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload result
        if: steps.parse.outputs.valid == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: result-${{ matrix.model }}
          path: /tmp/result.json
          retention-days: 90

  collect:
    needs: eval
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          pattern: result-*
          path: /tmp/results

      - name: Pull latest main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main

      - name: Merge results and check for regressions
        run: uv run python scripts/merge_results.py /tmp/results

      - name: Commit results
        run: |
          git add docs/data.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "benchmark: $(date -u +%Y-%m-%d) [skip ci]"
          git push
