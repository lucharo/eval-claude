name: Benchmark

on:
  schedule:
    - cron: '0 6,18 * * *' # Twice daily: 6am and 6pm UTC
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

concurrency:
  group: benchmark
  cancel-in-progress: false

jobs:
  matrix:
    runs-on: ubuntu-latest
    outputs:
      models: ${{ steps.read.outputs.models }}
    steps:
      - uses: actions/checkout@v4
      - name: Read models from config
        id: read
        run: echo "models=$(cat models.json)" >> "$GITHUB_OUTPUT"

  eval:
    needs: matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        model: ${{ fromJson(needs.matrix.outputs.models) }}

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Authenticate Claude Code
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          mkdir -p ~/.claude
          echo '{"hasCompletedOnboarding":true}' > ~/.claude.json
          EXPIRES_AT=$(($(date +%s) * 1000 + 31536000000))
          python3 -c "
          import json, os
          creds = {'claudeAiOauth': {
              'accessToken': os.environ['CLAUDE_CODE_OAUTH_TOKEN'],
              'expiresAt': ${EXPIRES_AT},
              'scopes': ['user:inference']
          }}
          with open(os.path.expanduser('~/.claude/.credentials.json'), 'w') as f:
              json.dump(creds, f)
          "

      - name: Verify Claude Code auth
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          echo "Testing CLI auth..."
          claude -p "Reply with just the word 'hello'" --output-format json --dangerously-skip-permissions 2>&1 || true

      - name: Install dependencies
        run: uv sync

      - name: Run GPQA Diamond eval
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          uv run inspect eval inspect_evals/gpqa_diamond \
            --model claude-code/${{ matrix.model }} \
            --limit 50 \
            -T epochs=1 \
            -M max_connections=10 \
            -M timeout=600

      - name: Parse results
        id: parse
        run: |
          if uv run python scripts/parse_eval.py > /tmp/result.json; then
            echo "Parsed result: $(cat /tmp/result.json)"
            echo "valid=true" >> "$GITHUB_OUTPUT"
          else
            EXIT_CODE=$?
            echo "::warning::Parse failed (exit $EXIT_CODE) — skipping result upload"
            echo "valid=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload result
        if: steps.parse.outputs.valid == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: result-${{ matrix.model }}
          path: /tmp/result.json
          retention-days: 90

  collect:
    needs: eval
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          pattern: result-*
          path: /tmp/results

      - name: Pull latest main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main

      - name: Merge results and check for regressions
        run: |
          python3 -c "
          import json, glob, math, sys

          with open('docs/data.json') as f:
              data = json.load(f)

          existing_count = len(data)

          new_results = []
          for path in sorted(glob.glob('/tmp/results/*/result.json')):
              with open(path) as f:
                  new_results.append(json.load(f))

          data.extend(new_results)

          with open('docs/data.json', 'w') as f:
              json.dump(data, f, indent=2)
              f.write('\n')

          # --- Nerf detection ---
          # For each model with new results, compare against historical data.
          # Flag if latest accuracy is below the historical lower 95% CI bound.
          if existing_count < 2:
              sys.exit(0)

          # Group historical data by model label
          def get_label(model):
              id = model.replace('claude-code/', '').replace('claude-', '')
              import re
              m = re.match(r'^(haiku|sonnet|opus)-(\d+)-(\d+)(?:-\d+)?$', id)
              if m: return f'{m.group(1).title()} {m.group(2)}.{m.group(3)}'
              if id in ('haiku', 'sonnet', 'opus'): return id.title()
              return id

          historical = data[:existing_count]
          by_label = {}
          for d in historical:
              label = get_label(d['model'])
              by_label.setdefault(label, []).append(d)

          alerts = []
          for result in new_results:
              label = get_label(result['model'])
              prev = by_label.get(label, [])
              if len(prev) < 2:
                  continue

              # Historical mean and pooled stderr
              accs = [p['accuracy'] for p in prev]
              mean_acc = sum(accs) / len(accs)
              # Use the average stderr as estimate of sampling uncertainty
              stderrs = [p.get('stderr', 0) for p in prev]
              avg_stderr = sum(stderrs) / len(stderrs) if stderrs else 0

              lower_bound = mean_acc - 1.96 * avg_stderr
              drop = mean_acc - result['accuracy']
              drop_pct = (drop / mean_acc * 100) if mean_acc > 0 else 0

              if result['accuracy'] < lower_bound:
                  alerts.append(
                      f\"::warning::{label} may be nerfed: \"
                      f\"{result['accuracy']*100:.1f}% vs historical {mean_acc*100:.1f}% \"
                      f\"(drop of {drop_pct:.1f}%, below 95% CI lower bound {lower_bound*100:.1f}%)\"
                  )

          for alert in alerts:
              print(alert)
          "

      - name: Commit results
        run: |
          git add docs/data.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "benchmark: $(date -u +%Y-%m-%d) [skip ci]"
          git push
