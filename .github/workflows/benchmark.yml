name: Benchmark

on:
  schedule:
    - cron: '0 6,18 * * *' # Twice daily: 6am and 6pm UTC
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

concurrency:
  group: benchmark
  cancel-in-progress: false

jobs:
  eval:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        model:
          - claude-haiku-4-5-20251001
          - claude-sonnet-4-5-20250929
          - claude-sonnet-4-6
          - claude-opus-4-5-20251101
          - claude-opus-4-6

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Authenticate Claude Code
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          mkdir -p ~/.claude
          echo '{"hasCompletedOnboarding":true}' > ~/.claude.json
          EXPIRES_AT=$(($(date +%s) * 1000 + 31536000000))
          python3 -c "
          import json, os
          creds = {'claudeAiOauth': {
              'accessToken': os.environ['CLAUDE_CODE_OAUTH_TOKEN'],
              'expiresAt': ${EXPIRES_AT},
              'scopes': ['user:inference']
          }}
          with open(os.path.expanduser('~/.claude/.credentials.json'), 'w') as f:
              json.dump(creds, f)
          "

      - name: Verify Claude Code auth
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          echo "Testing CLI auth..."
          claude -p "Reply with just the word 'hello'" --output-format json --dangerously-skip-permissions 2>&1 || true

      - name: Install dependencies
        run: uv sync

      - name: Run GPQA Diamond eval
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          uv run inspect eval inspect_evals/gpqa_diamond \
            --model claude-code/${{ matrix.model }} \
            --limit 50 \
            -M max_connections=10 \
            -M timeout=600

      - name: Parse results
        run: |
          uv run python scripts/parse_eval.py > /tmp/result.json
          echo "Parsed result: $(cat /tmp/result.json)"

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: result-${{ matrix.model }}
          path: /tmp/result.json
          retention-days: 90

  collect:
    needs: eval
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          pattern: result-*
          path: /tmp/results

      - name: Merge results into data.json
        run: |
          python3 -c "
          import json, glob

          with open('docs/data.json') as f:
              data = json.load(f)

          for path in sorted(glob.glob('/tmp/results/*/result.json')):
              with open(path) as f:
                  data.append(json.load(f))

          with open('docs/data.json', 'w') as f:
              json.dump(data, f, indent=2)
              f.write('\n')
          "

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "benchmark: $(date -u +%Y-%m-%d) [skip ci]"
          git push
