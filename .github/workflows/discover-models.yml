name: Discover new models

on:
  schedule:
    - cron: '0 12 * * 1' # Weekly on Monday at noon UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - name: Check for new models
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        id: check
        run: uv run python scripts/discover_models.py --update

      - name: Commit new models
        if: steps.check.outputs.has_new == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          MODELS='${{ steps.check.outputs.new_models }}'
          git add models.json
          git commit -m "feat: add new Claude models: $MODELS [skip ci]"
          git push
